name: spatialbench
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip=23.1
  - setuptools=67.8
  - wheel
  # Qt backend — pin a concrete PyQt 5 release compatible with napari
  - pyqt=5.15.9
  - qtpy
  # Core scientific stack
  - numpy>=1.23
  - pandas>=1.5
  - pyarrow>=12.0
  - scipy>=1.10
  - scikit-learn>=1.2
  - scikit-image>=0.20
  - matplotlib>=3.7
  # Spatial biology
  - napari=0.4.19
  - tifffile>=2023.1
  - anndata>=0.9
  - scanpy>=1.9
  # Visualisation
  - plotly>=5.14
  # Image processing / polygon rasterisation
  - opencv>=4.7
  - shapely>=2.0
  # Development / testing
  - pytest>=7.0
  - pytest-cov

